<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Painel</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>Painel</h1>
    <button class="logout-btn" id="logout-btn">Sair</button>
  </div>

  <div class="container">

    <div class="panel">
      <h2>Enviar arquivo</h2>
      <div class="upload-row">
        <select id="upload-category"></select>
        <input type="file" id="file-input" multiple accept="image/*,video/*">
        <button class="btn" id="upload-btn">Enviar</button>
      </div>
      <div class="progress" id="upload-progress"></div>
    </div>

    <div class="panel">
      <h2>Categorias</h2>
      <div class="new-cat-row">
        <input type="text" id="new-cat-name" placeholder="Nome da nova categoria">
        <button class="btn secondary" id="add-cat-btn">Criar categoria</button>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="grid" id="grid"></div>
    <p class="empty-msg" id="empty-msg" style="display:none;">Nenhum arquivo nesta categoria ainda.</p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
